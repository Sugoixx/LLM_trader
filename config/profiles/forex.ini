# -----------------------------------------------------------------------------
# Profile: FOREX
# Launch with:  python start.py --profile forex
# -----------------------------------------------------------------------------
# This file is MERGED on top of the default config/config.ini in the sense that
# only the sections/keys present here override what would normally be loaded.
# In practice, the loader reads THIS file in full when --profile forex is used,
# so every section the bot needs must be present (copy from config.ini and tweak).
#
# To create a new profile: copy this file, rename to <name>.ini, change
# crypto_pair + dashboard_port + data_dir, then run:  python start.py --profile <name>
# -----------------------------------------------------------------------------

[general]
crypto_pair = EURUSD
timeframe = 30m
analysis_cooldown_minutes = 0
candle_limit = 999
ai_chart_candle_limit = 125
discord_bot = false
include_coin_description = false
skip_llm_when_market_closed = true
preopen_analysis_minutes = 20

[ai_providers]
provider = openrouter
openrouter_base_url = https://openrouter.ai/api/v1
openrouter_base_model = anthropic/claude-haiku-4.5
openrouter_fallback_model = z-ai/glm-5.1
google_studio_model = gemini-3-flash-preview
blockrun_base_url = https://blockrun.ai/api
blockrun_model = deepseek/deepseek-reasoner
lm_studio_base_url = http://localhost:1234/v1
lm_studio_model =
lm_studio_streaming = false

[directories]
# ISOLATE per-profile data so each instance has its own persistence/brain/charts
log_dir = logs/forex
data_dir = data/forex

[dashboard]
# MUST be a distinct port from other profiles
enabled = true
host = 0.0.0.0
port = 8001

[mt5]
# Forex needs MT5
enabled = true
market_stale_tick_seconds = 1800

[rag]
update_interval_hours = 4
categories_update_interval_hours = 168
coingecko_update_interval_hours = 24
defillama_update_interval_hours = 0.25
news_limit = 5
article_max_tokens = 500
news_filter_sources = true
news_allowed_feeds = seekingalpha,invezz,coinpaper,cryptopotato

[exchanges]
supported = binance,kucoin,gateio,mexc,hyperliquid
market_refresh_hours = 24

[demo_trading]
demo_quote_capital = 999
transaction_fee_percent = 0.00075

[debate]
enabled = true
use_quick_model = true
skip_for_hold = true

[backtest]
initial_capital = 10000

[live_trading]
enabled = false
exchange = binance
order_type = market
max_order_usd = 500
confirm_orders = false

[execution_engine]
enabled = true
trailing_enabled = true
trailing_atr_multiplier = 2.0
trailing_breakeven_on_tp1 = true
partial_enabled = false
partial_targets = 0.5:0.5, 1.0:1.0

[fast_trading]
min_interval_seconds = 900
daily_loss_pct_limit = -3.0
consecutive_loss_threshold = 3
consecutive_loss_cooldown_seconds = 7200
poll_interval_seconds = 300
block_minutes_before_close = 15
allow_gap_trading = false

[model_config]
temperature = 0.7
top_p = 0.9
top_k = 40
max_tokens = 32768
google_temperature = 1.0
google_top_p = 0.95
google_top_k = 64
google_max_tokens = 32768
google_thinking_level = high
google_code_execution = false

[debug]
save_chart_images = false
chart_save_path = chart_images
logger_debug = true
